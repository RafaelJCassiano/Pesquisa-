<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SJC Auditoria - Campo</title>
  <style>
    :root { 
      --primary: #0056b3; 
      --bg: #f8f9fa; 
      --card-bg: #ffffff; 
      --text-gray: #5f6368;
      --badge-blue: #e8f0fe;
      --badge-red: #fce8e6;
      --border-light: #e0e0e0;
    }

    body { 
      font-family: 'Segoe UI', Roboto, sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding: 0; 
      color: #1c1e21; 
    }

    .sticky-top { 
      position: sticky; 
      top: 0; 
      z-index: 1000; 
      background: white; 
      padding: 12px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
    }

    .header-btn { 
      background: var(--primary); 
      color: white; 
      padding: 14px; 
      border-radius: 8px; 
      margin-bottom: 12px; 
      text-align: center; 
      font-weight: bold;
      font-size: 18px;
    }

    #search { 
      width: 100%; 
      padding: 15px; 
      border: 2px solid var(--primary); 
      border-radius: 35px; 
      font-size: 16px; 
      box-sizing: border-box; 
      outline: none; 
      text-transform: uppercase;
    }

    .content { padding: 12px; }

    .card { 
      background: var(--card-bg); 
      border-radius: 15px; 
      padding: 16px; 
      margin-bottom: 15px; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
      border-left: 8px solid var(--primary); 
    }

    .badge-container {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
    }

    .badge-mes { background: var(--badge-blue); color: #1967d2; }
    .badge-status { background: var(--badge-red); color: #d93025; }

    .endereco-txt { 
      color: var(--primary); 
      font-weight: 800; 
      font-size: 14px; 
      text-transform: uppercase;
      display: block;
      margin-bottom: 10px;
    }

    .info-row { 
      display: flex; 
      margin-bottom: 4px; 
      font-size: 13px; 
    }

    .label { font-weight: 600; color: #666; width: 120px; flex-shrink: 0; }
    .value { color: #111; flex: 1; text-transform: uppercase; font-weight: 500; }
    .value b { color: #000; font-weight: 800; }

    #loading { text-align: center; display: none; padding: 10px; color: var(--primary); font-weight: bold; }
  </style>
</head>
<body>

  <div class="sticky-top">
    <div class="header-btn">Auditoria SJC - Pesquisa</div>
    <input type="text" id="search" placeholder="RUA E NÚMERO, HIDRÔMETRO OU TACE" inputmode="search" autocomplete="off">
    <div id="loading">Buscando...</div>
  </div>

  <div class="content" id="results-container">
    <p style="text-align: center; color: #999; margin-top: 20px;">Digite rua e número para pesquisar.</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://smzehsmsqrshnvoiwzap.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hAMXYnXJ5cjc8Ii9gAgscw_Uh3H_JM4';

    const container = document.getElementById('results-container');
    const loading = document.getElementById('loading');
    let timeout = null;

    document.getElementById('search').oninput = function () {
      clearTimeout(timeout);
      const t = this.value.trim().toUpperCase();
      if (t.length < 3) {
        container.innerHTML = '<p style="text-align: center; color: #999; margin-top: 20px;">Digite pelo menos 3 caracteres.</p>';
        return;
      }
      timeout = setTimeout(() => { executarBusca(t); }, 600);
    };

    async function executarBusca(t) {
      loading.style.display = 'block';

      // LÓGICA DE BUSCA MULTI-TERMOS (Rua + Número)
      // Quebra "Rua Dez 100" em ["Rua", "Dez", "100"]
      const palavras = t.split(/\s+/).filter(p => p.length > 0);
      
      // Cria o filtro: todas as palavras devem estar contidas no Endereço (Operador AND)
      const filtroEndereco = `Endereço.ilike.*${palavras.join('*')}*`;

      const filtrosOr = [
        filtroEndereco,
        `Hidrômetro.ilike.*${t}*`,
        `Nome_do_TACE.ilike.*${t}*` // Verifique se o nome da coluna é este no banco
      ];

      // Se for apenas números, busca pelo código exato também
      if (/^\d+$/.test(t)) {
        filtrosOr.push(`Codigo_do_Fornecimento.eq.${t}`);
      }

      const url = `${SUPABASE_URL}/rest/v1/Dados` +
        `?select=ATC,Endereço,Codigo_do_Fornecimento,Hidrômetro,Leitura,Mes_Referencia,Leitura_Anterior,Nome_do_TACE` +
        `&or=(${encodeURIComponent(filtrosOr.join(','))})` +
        `&limit=40`;

      try {
        const response = await fetch(url, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        const dados = await response.json();
        container.innerHTML = "";

        if (!dados || dados.length === 0) {
          container.innerHTML = "<p style='text-align:center; color:#999;'>Nenhum registro encontrado.</p>";
          return;
        }

        dados.forEach(d => {
          // Garante que não exiba o cabeçalho se ele vier como dado
          if (d.ATC === "ATC") return;

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="badge-container">
              <span class="badge badge-mes">${d.Mes_Referencia || 'MÊS N/A'}</span>
              <span class="badge badge-status">PENDENTE</span>
            </div>

            <span class="endereco-txt">${d["Endereço"] || 'ENDEREÇO NÃO LOCALIZADO'}</span>

            <div class="info-row">
              <span class="label">Fornecimento:</span>
              <span class="value">${d.Codigo_do_Fornecimento || '-'}</span>
            </div>

            <div class="info-row">
              <span class="label">TACE:</span>
              <span class="value">${d.Nome_do_TACE || 'NÃO ATRIBUÍDO'}</span>
            </div>

            <div class="info-row">
              <span class="label">Hidrômetro:</span>
              <span class="value">${d["Hidrômetro"] || '-'}</span>
            </div>

            <div class="info-row">
              <span class="label">Leitura Anterior:</span>
              <span class="value"><b>${d.Leitura_Anterior || '0'}</b></span>
            </div>

            <div class="info-row">
              <span class="label">Leitura Atual:</span>
              <span class="value"><b>${d.Leitura || '0'}</b></span>
            </div>
          `;
          container.appendChild(card);
        });

      } catch (e) {
        container.innerHTML = "<p style='text-align:center; color:red;'>Erro ao conectar com o servidor.</p>";
      } finally {
        loading.style.display = 'none';
      }
    }
  </script>
</body>
</html>
