<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SJC Auditoria - Campo</title>
  <style>
    /* Definições de Cores e Variáveis */
    :root { 
      --primary: #0056b3; 
      --bg: #f8f9fa; 
      --card-bg: #ffffff; 
      --text-gray: #5f6368;
      --badge-blue: #e8f0fe;
      --badge-red: #fce8e6;
      --border-light: #e0e0e0;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding: 0; 
      color: #1c1e21; 
    }

    /* Topo Fixo */
    .sticky-top { 
      position: sticky; 
      top: 0; 
      z-index: 1000; 
      background: white; 
      padding: 12px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
    }

    .header-btn { 
      background: var(--primary); 
      color: white; 
      padding: 14px; 
      border-radius: 8px; 
      margin-bottom: 12px; 
      text-align: center; 
      font-weight: bold;
      font-size: 18px;
    }

    #search { 
      width: 100%; 
      padding: 15px 25px; 
      border: 2px solid var(--primary); 
      border-radius: 35px; 
      font-size: 16px; 
      box-sizing: border-box; 
      outline: none; 
      text-transform: uppercase;
      color: #555;
    }

    /* Conteúdo e Cards */
    .content { padding: 12px; }

    .card { 
      background: var(--card-bg); 
      border-radius: 20px; 
      padding: 18px; 
      margin-bottom: 15px; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
      border-left: 10px solid var(--primary); 
      position: relative;
    }

    /* Selos/Badges */
    .badge-container {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .badge {
      padding: 5px 15px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge-mes { background: var(--badge-blue); color: #1967d2; }
    .badge-status { background: var(--badge-red); color: #d93025; font-size: 11px; }

    /* Texto do Endereço */
    .endereco-txt { 
      color: var(--primary); 
      font-weight: 800; 
      font-size: 15px; 
      line-height: 1.4;
      margin-bottom: 12px; 
      display: block; 
      text-transform: uppercase;
    }

    /* Linhas de Informação */
    .info-row { 
      display: flex; 
      margin-bottom: 5px; 
      font-size: 14px; 
      align-items: baseline;
    }

    .label { 
      font-weight: 600; 
      color: #666; 
      width: 135px; 
      flex-shrink: 0;
    }

    .value { 
      color: #111; 
      flex: 1; 
      text-transform: uppercase;
    }

    .value b { color: #000; font-weight: 900; }

    #loading { text-align: center; display: none; padding: 10px; color: var(--primary); font-weight: bold; }
  </style>
</head>
<body>

  <div class="sticky-top">
    <div class="header-btn">
      Pesquisa Fornecimentos
    </div>
    <input type="text" id="search" placeholder="BUSCAR ENDEREÇO, HIDRÔMETRO OU TACE...">
    <div id="loading">Buscando dados...</div>
  </div>

  <div class="content" id="results-container">
    <p style="text-align: center; color: #999; margin-top: 20px;">Digite pelo menos 3 caracteres para pesquisar.</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://smzehsmsqrshnvoiwzap.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hAMXYnXJ5cjc8Ii9gAgscw_Uh3H_JM4';

    const container = document.getElementById('results-container');
    const loading = document.getElementById('loading');
    let timeout = null;

    document.getElementById('search').oninput = function () {
      clearTimeout(timeout);
      const t = this.value.trim().toUpperCase();
      if (t.length < 3) {
        container.innerHTML = '<p style="text-align: center; color: #999; margin-top: 20px;">Digite pelo menos 3 caracteres para pesquisar.</p>';
        return;
      }
      timeout = setTimeout(() => { executarBusca(t); }, 500);
    };

    async function executarBusca(t) {
      loading.style.display = 'block';

      const whereOr = [
        `Endereço.ilike.*${t}*`,
        `Hidrômetro.ilike.*${t}*`
      ];

      if (/^\d+$/.test(t)) {
        whereOr.push(`Codigo_do_Fornecimento.eq.${t}`);
      }

      const url =
        `${SUPABASE_URL}/rest/v1/Dados` +
        `?select=${encodeURIComponent('ATC,Endereço,Codigo_do_Fornecimento,Hidrômetro,Leitura,Mes_Referencia')}` +
        `&or=(${encodeURIComponent(whereOr.join(','))})` +
        `&limit=50`;

      try {
        const response = await fetch(url, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          container.innerHTML = `<p style="text-align:center; color:red;">Erro na conexão.</p>`;
          return;
        }

        const dados = await response.json();
        container.innerHTML = "";

        if (!dados || dados.length === 0) {
          container.innerHTML = "<p style='text-align:center; color:#999;'>Nenhum registro encontrado.</p>";
          return;
        }

        dados.forEach(d => {
          if (d.ATC === "ATC") return;

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="badge-container">
              <span class="badge badge-mes">${d["Mes_Referencia"] || 'JANEIRO'}</span>
              <span class="badge badge-status">INATIVO</span>
            </div>

            <span class="endereco-txt">${d["Endereço"] || 'SEM ENDEREÇO'}</span>

            <div class="info-row">
              <span class="label">Fornecimento:</span>
              <span class="value">${d["Codigo_do_Fornecimento"] ?? '-'}</span>
            </div>

            <div class="info-row">
              <span class="label">Nome do TACE:</span>
              <span class="value">BRUNO DA SILVA FEITOZA</span>
            </div>

            <div class="info-row">
              <span class="label">Hidrômetro:</span>
              <span class="value">${d["Hidrômetro"] ?? '-'}</span>
            </div>

            <div class="info-row">
              <span class="label">Leitua Anterior:</span>
              <span class="value"><b>2020</b></span>
            </div>

            <div class="info-row">
              <span class="label">Leitura:</span>
              <span class="value"><b>${d["Leitura"] ?? '-'}</b></span>
            </div>

            <div class="info-row">
              <span class="label">Consumo:</span>
              <span class="value">-</span>
            </div>

            <div class="info-row">
              <span class="label">Cod.:</span>
              <span class="value">-</span>
            </div>

            <div class="info-row">
              <span class="label">Retido?:</span>
              <span class="value">Não</span>
            </div>
          `;
          container.appendChild(card);
        });

      } catch (e) {
        container.innerHTML = "<p style='text-align:center; color:red;'>Erro ao carregar dados.</p>";
      } finally {
        loading.style.display = 'none';
      }
    }
  </script>
</body>
</html>
