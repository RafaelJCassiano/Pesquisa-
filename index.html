<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SJC Auditoria - Campo</title>
  <style>
    :root { --primary: #0056b3; --bg: #f8f9fa; --card-bg: #ffffff; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 0; }
    .sticky-top { position: sticky; top: 0; z-index: 1000; background: white; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header-btn { background: var(--primary); color: white; padding: 14px; border-radius: 8px; margin-bottom: 12px; text-align: center; font-weight: bold; }
    #search { width: 100%; padding: 15px; border: 2px solid var(--primary); border-radius: 35px; font-size: 16px; box-sizing: border-box; outline: none; text-transform: uppercase; }
    .content { padding: 12px; }
    .card { background: var(--card-bg); border-radius: 15px; padding: 16px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 8px solid var(--primary); }
    .endereco-txt { color: var(--primary); font-weight: 800; font-size: 14px; text-transform: uppercase; display: block; margin-bottom: 10px; }
    .info-row { display: flex; margin-bottom: 4px; font-size: 13px; }
    .label { font-weight: 600; color: #666; width: 120px; flex-shrink: 0; }
    .value { color: #111; flex: 1; text-transform: uppercase; font-weight: 500; }
    #loading { text-align: center; display: none; padding: 10px; color: var(--primary); font-weight: bold; }
  </style>
</head>
<body>

  <div class="sticky-top">
    <div class="header-btn">Auditoria SJC - Pesquisa</div>
    <input type="text" id="search" placeholder="RUA E NÚMERO, HIDRÔMETRO OU TACE" autocomplete="off">
    <div id="loading">Buscando no banco...</div>
  </div>

  <div class="content" id="results-container">
    <p style="text-align: center; color: #999; margin-top: 20px;">Digite para pesquisar.</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://smzehsmsqrshnvoiwzap.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hAMXYnXJ5cjc8Ii9gAgscw_Uh3H_JM4';

    const container = document.getElementById('results-container');
    const loading = document.getElementById('loading');
    let timeout = null;

    document.getElementById('search').oninput = function () {
      clearTimeout(timeout);
      const t = this.value.trim().toUpperCase();
      if (t.length < 3) return;
      timeout = setTimeout(() => { executarBusca(t); }, 500);
    };

    async function executarBusca(t) {
      loading.style.display = 'block';
      
      // Criamos os filtros baseados no que você digitou
      // Se você digitar "RUA DEZ 100", ele busca registros que contenham essas palavras
      const p = t.split(/\s+/);
      const filtroEndereco = `Endereço.ilike.*${p.join('*')}*`;

      // IMPORTANTE: Verifique se os nomes das colunas (Endereço, Hidrômetro) 
      // estão idênticos ao que está no seu Supabase (maiúsculas/acentos)
      const filtrosOr = [
        filtroEndereco,
        `Hidrômetro.ilike.*${t}*`
      ];

      // Tenta buscar as colunas básicas. Removi "Nome_do_TACE" e "Leitura_Anterior" 
      // para evitar erro caso elas tenham nomes diferentes no seu banco.
      const colunas = "Endereço,Codigo_do_Fornecimento,Hidrômetro,Leitura,Mes_Referencia";
      
      const url = `${SUPABASE_URL}/rest/v1/Dados?select=${colunas}&or=(${encodeURIComponent(filtrosOr.join(','))})&limit=30`;

      try {
        const response = await fetch(url, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        if (!response.ok) {
          const erroTexto = await response.text();
          console.error("Erro Supabase:", erroTexto);
          container.innerHTML = `<p style='text-align:center; color:red;'>Erro no Servidor: Verifique os nomes das colunas.</p>`;
          return;
        }

        const dados = await response.json();
        container.innerHTML = "";

        if (dados.length === 0) {
          container.innerHTML = "<p style='text-align:center; color:#999;'>Nenhum registro encontrado.</p>";
          return;
        }

        dados.forEach(d => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <span class="endereco-txt">${d["Endereço"] || 'SEM ENDEREÇO'}</span>
            <div class="info-row"><span class="label">Fornecimento:</span><span class="value">${d.Codigo_do_Fornecimento || '-'}</span></div>
            <div class="info-row"><span class="label">Hidrômetro:</span><span class="value">${d["Hidrômetro"] || '-'}</span></div>
            <div class="info-row"><span class="label">Leitura:</span><span class="value"><b>${d.Leitura || '-'}</b></span></div>
            <div class="info-row"><span class="label">Mês:</span><span class="value">${d.Mes_Referencia || '-'}</span></div>
          `;
          container.appendChild(card);
        });

      } catch (e) {
        container.innerHTML = "<p style='text-align:center; color:red;'>Erro de conexão. Verifique a internet.</p>";
      } finally {
        loading.style.display = 'none';
      }
    }
  </script>
</body>
</html>
