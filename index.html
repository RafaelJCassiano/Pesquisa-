<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SJC Auditoria - Campo</title>
  <style>
    :root { 
      --primary: #0056b3; 
      --bg: #f8f9fa; 
      --card-bg: #ffffff; 
      --badge-blue: #e8f0fe;
      --badge-red: #fce8e6;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background: var(--bg); margin: 0; padding: 0; color: #1c1e21; 
    }

    .sticky-top { 
      position: sticky; top: 0; z-index: 1000; 
      background: white; padding: 12px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
    }

    .header-btn { 
      background: var(--primary); color: white; padding: 14px; 
      border-radius: 8px; margin-bottom: 12px; 
      text-align: center; font-weight: bold; font-size: 18px;
    }

    #search { 
      width: 100%; padding: 15px 25px; 
      border: 2px solid var(--primary); border-radius: 35px; 
      font-size: 16px; box-sizing: border-box; outline: none; 
      text-transform: uppercase; color: #555;
    }

    .content { padding: 12px; }

    .card { 
      background: var(--card-bg); border-radius: 20px; 
      padding: 18px; margin-bottom: 15px; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
      border-left: 10px solid var(--primary);
    }

    .badge-container { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .badge { padding: 5px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; }
    .badge-mes { background: var(--badge-blue); color: #1967d2; text-transform: uppercase; }
    .badge-status { background: var(--badge-red); color: #d93025; }
    .badge-ativo { background: #e6f4ea; color: #1e8e3e; }

    .endereco-txt { 
      color: var(--primary); font-weight: 800; font-size: 15px; 
      line-height: 1.4; margin-bottom: 12px; display: block; text-transform: uppercase;
    }

    .info-row { display: flex; margin-bottom: 5px; font-size: 14px; align-items: baseline; }
    .label { font-weight: 600; color: #666; width: 135px; flex-shrink: 0; }
    .value { color: #111; flex: 1; text-transform: uppercase; }
    .value b { color: #000; font-weight: 900; }

    /* Estilo especial para a Causa de Não Leitura */
    .causa-alerta { color: #d93025; font-weight: bold; font-size: 13px; }

    #loading { text-align: center; display: none; padding: 10px; color: var(--primary); font-weight: bold; }
  </style>
</head>
<body>

  <div class="sticky-top">
    <div class="header-btn">Pesquisa Fornecimentos</div>
    <input type="text" id="search" placeholder="ENDEREÇO, HIDRÔMETRO OU TACE...">
    <div id="loading">Buscando dados...</div>
  </div>

  <div class="content" id="results-container">
    <p style="text-align: center; color: #999; margin-top: 20px;">Digite pelo menos 3 caracteres.</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://smzehsmsqrshnvoiwzap.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hAMXYnXJ5cjc8Ii9gAgscw_Uh3H_JM4';

    const container = document.getElementById('results-container');
    const loading = document.getElementById('loading');
    let timeout = null;

    function formatarMes(mes) {
      const meses = {
        "1": "JANEIRO", "1.0": "JANEIRO", "2": "FEVEREIRO", "2.0": "FEVEREIRO",
        "3": "MARÇO", "3.0": "MARÇO", "4": "ABRIL", "4.0": "ABRIL",
        "5": "MAIO", "5.0": "MAIO", "6": "JUNHO", "6.0": "JUNHO",
        "7": "JULHO", "7.0": "JULHO", "8": "AGOSTO", "8.0": "AGOSTO",
        "9": "SETEMBRO", "9.0": "SETEMBRO", "10": "OUTUBRO", "10.0": "OUTUBRO",
        "11": "NOVEMBRO", "11.0": "NOVEMBRO", "12": "DEZEMBRO", "12.0": "DEZEMBRO"
      };
      return meses[String(mes)] || "MÊS " + mes;
    }

    document.getElementById('search').oninput = function () {
      clearTimeout(timeout);
      const t = this.value.trim().toUpperCase();
      if (t.length < 3) {
        container.innerHTML = '<p style="text-align: center; color: #999; margin-top: 20px;">Digite pelo menos 3 caracteres.</p>';
        return;
      }
      timeout = setTimeout(() => { executarBusca(t); }, 500);
    };

    async function executarBusca(t) {
      loading.style.display = 'block';

      const whereOr = [
        `Endereço.ilike.*${t}*`,
        `Hidrômetro.ilike.*${t}*`,
        `Nome_do_TACE.ilike.*${t}*`
      ];

      if (/^\d+$/.test(t)) {
        whereOr.push(`Codigo_do_Fornecimento.eq.${t}`);
      }

      // ADICIONADO: Causas_de_Leitura_Não_Leitura_Atual no select
      const colunas = [
        'ATC', 'Endereço', 'Codigo_do_Fornecimento', 'Hidrômetro', 
        'Leitura', 'Leitura_anterior', 'Mes_Referencia', 
        'Nome_do_TACE', 'Situacao_Imovel', 'Causas_de_Leitura_Não_Leitura_Atual'
      ];

      const url = `${SUPABASE_URL}/rest/v1/Dados?select=${encodeURIComponent(colunas.join(','))}&or=(${encodeURIComponent(whereOr.join(','))})&limit=50`;

      try {
        const response = await fetch(url, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          const err = await response.json();
          container.innerHTML = `<p style="text-align:center; color:red;">Erro: ${err.message}</p>`;
          return;
        }

        const dados = await response.json();
        container.innerHTML = "";

        if (dados.length === 0) {
          container.innerHTML = "<p style='text-align:center; color:#999;'>Nenhum registro encontrado.</p>";
          return;
        }

        dados.forEach(d => {
          const statusClass = d.Situacao_Imovel === 'INATIVO' ? 'badge-status' : 'badge-ativo';
          const mesTexto = formatarMes(d.Mes_Referencia);
          
          // Lógica para exibir "NENHUMA" se o campo estiver vazio ou for espaço
          const causaTxt = (d.Causas_de_Leitura_Não_Leitura_Atual && d.Causas_de_Leitura_Não_Leitura_Atual.trim() !== "") 
                           ? d.Causas_de_Leitura_Não_Leitura_Atual 
                           : "_";

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="badge-container">
              <span class="badge badge-mes">${mesTexto}</span>
              <span class="badge ${statusClass}">${d.Situacao_Imovel || 'ATIVO'}</span>
            </div>

            <span class="endereco-txt">${d["Endereço"] || 'SEM ENDEREÇO'}</span>

            <div class="info-row">
              <span class="label">Fornecimento:</span>
              <span class="value">${d.Codigo_do_Fornecimento || '-'}</span>
            </div>

            <div class="info-row">
              <span class="label">Nome do TACE:</span>
              <span class="value">${d.Nome_do_TACE || 'NÃO INFORMADO'}</span>
            </div>

            <div class="info-row">
              <span class="label">Hidrômetro:</span>
              <span class="value">${d["Hidrômetro"] || '-'}</span>
            </div>

            <div class="info-row">
              <span class="label">Leitura Anterior:</span>
              <span class="value"><b>${d.Leitura_anterior || '-'}</b></span>
            </div>

            <div class="info-row">
              <span class="label">Leitura:</span>
              <span class="value"><b>${d.Leitura || 'PENDENTE'}</b></span>
            </div>

            <div class="info-row">
              <span class="label">Cod:</span>
              <span class="value causa-alerta">${causaTxt}</span>
            </div>
          `;
          container.appendChild(card);
        });

      } catch (e) {
        container.innerHTML = "<p style='text-align:center; color:red;'>Erro de conexão.</p>";
      } finally {
        loading.style.display = 'none';
      }
    }
  </script>
</body>
</html>
